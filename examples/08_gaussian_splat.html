<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>08 — Gaussian Splat</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- Import map: route bare "three" imports to 8frame's global THREE.
       Also map "three/" prefix to esm.sh r137 so Zappar's internal addon
       imports (e.g. three/examples/jsm/...) resolve correctly.
       (Spark.js requires r178+ which is incompatible with 8frame's renderer.) -->
  <script>
    (function () {
      // Build ES module shim re-exporting window.THREE
      var keys = Object.keys(window.THREE).filter(function (k) {
        return /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k);
      });
      var code = keys.map(function (k) {
        return 'export const ' + k + ' = window.THREE["' + k + '"];';
      }).join('\n') + '\nexport default window.THREE;\n';
      var blob = new Blob([code], {type: 'text/javascript'});
      var url = URL.createObjectURL(blob);

      var map = document.createElement('script');
      map.type = 'importmap';
      map.textContent = JSON.stringify({imports: {
        'three': url,
        'three/': 'https://esm.sh/three@0.137.0/'
      }});
      document.currentScript.after(map);
    })();
  </script>

  <!-- Monkey-patch Worker to handle cross-origin URLs.
       Zappar creates a Worker from an esm.sh URL, which browsers block
       (same-origin policy). This converts cross-origin URLs into blob
       URLs that use importScripts() as a workaround. -->
  <script>
    (function () {
      var OriginalWorker = window.Worker;
      window.Worker = function PatchedWorker(url, options) {
        try {
          return new OriginalWorker(url, options);
        } catch (e) {
          if (e.name === 'SecurityError') {
            var blobCode = 'importScripts("' + url + '");';
            var blob = new Blob([blobCode], {type: 'text/javascript'});
            var blobUrl = URL.createObjectURL(blob);
            return new OriginalWorker(blobUrl, options);
          }
          throw e;
        }
      };
      window.Worker.prototype = OriginalWorker.prototype;
    })();
  </script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/Target_1000055040.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 830, "height": 830,
            "originalWidth": 830, "originalHeight": 830,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <!-- Custom component: loads a Gaussian Splat via @zappar/three-gaussian-splat.
       This library uses GLSL ES 1.0 shaders and RawShaderMaterial with basic
       Three.js APIs (InstancedBufferGeometry, BufferAttribute), all available
       since Three.js ~r72 — fully compatible with r137 bundled in 8frame.
       Supports .splat file format. -->
  <script>
    AFRAME.registerComponent('zappar-splat', {
      schema: {
        src: {type: 'string'},
        maxSplats: {type: 'number', default: 0}
      },
      init: async function () {
        try {
          var ZapSplat = await import('https://esm.sh/@zappar/three-gaussian-splat@0.1.0?external=three');
          var sceneEl = this.el.sceneEl;
          var camera = sceneEl.camera;
          var renderer = sceneEl.renderer;

          this.splat = new ZapSplat.GaussianSplatMesh(
            camera, renderer, this.data.src,
            this.data.maxSplats || undefined
          );
          await this.splat.load();
          this.el.object3D.add(this.splat);

          // The splat needs per-frame sorting updates
          this._tick = function () {
            if (this.splat) this.splat.update(camera, renderer);
          }.bind(this);
        } catch (err) {
          console.error('Failed to load Gaussian splat:', err);
        }
      },
      tick: function () {
        if (this._tick) this._tick();
      },
      remove: function () {
        if (this.splat) {
          this.el.object3D.remove(this.splat);
          if (this.splat.dispose) this.splat.dispose();
        }
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    vr-mode-ui="enabled: false"
    xrweb="disableWorldTracking: true">

    <!-- Increase timeout for large splat files -->
    <a-assets timeout="30000">
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="my-poster">

      <!-- Gaussian Splat — replace src with your own .splat file
           Convert .sog/.ply files at https://playcanvas.com/supersplat/editor
           Scale is critical: splat scenes are often real-world scale
           and need significant scaling down to fit on an image target -->
      <a-entity zappar-splat="src: ../assets/splat_30000.splat"
                position="0 0.5 0"
                scale="0.3 0.3 0.3">
      </a-entity>

    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
